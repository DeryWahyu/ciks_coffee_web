name: Build Docker Image

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: derywahyu
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ghcr.io/derywahyu/ciks-coffee-web:latest
            ghcr.io/derywahyu/ciks-coffee-web:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          envs: ENV_FILE
          script: |
            mkdir -p /opt/ciks-coffee/storage
            echo "$ENV_FILE" > /opt/ciks-coffee/.env
            echo ${{ secrets.DOCKER_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            IMAGE_NAME="ghcr.io/derywahyu/ciks-coffee-web:sha-${{ github.sha }}"
            
            docker pull $IMAGE_NAME
            
            docker stop ciks-coffee-web || true
            docker rm ciks-coffee-web || true
            
            docker run -d \
              --name ciks-coffee-web \
              --restart unless-stopped \
              --network npm-network \
              --network db-network \
              -v /opt/ciks-coffee/.env:/var/www/html/.env \
              -v /opt/ciks-coffee/storage:/var/www/html/storage/app/public \
              $IMAGE_NAME

            docker image prune -f --filter "dangling=true"
